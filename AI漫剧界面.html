<!DOCTYPE html>
<meta charset="UTF-8">
<title>AI漫剧</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Microsoft YaHei,sans-serif;background:linear-gradient(135deg,#0c0a20,#1a163a,#251f4a);color:#e0e0ff;min-height:100vh;padding:60px 20px}
.container{max-width:1100px;margin:0 auto}
.title{font-size:32px;margin-bottom:40px;text-align:center;background:linear-gradient(90deg,#8860ff,#40e0ff);-webkit-background-clip:text;color:transparent}

.grid{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:30px;
}

.item {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.item video{
  width:100%;
  border-radius:16px;
  box-shadow:0 0 30px rgba(136,96,255,.2);
}

.item-title {
  font-size: 17px;
  font-weight: bold;
  color: #ffffff;
  line-height: 1.4;
}
.item-desc {
  font-size: 14px;
  color: #b8b0d4;
  line-height: 1.5;
}

.back{position:fixed;bottom:30px;right:30px;padding:12px 24px;background:linear-gradient(90deg,#8860ff,#40e0ff);color:#fff;border-radius:50px;text-decoration:none}
</style>

<div class="container">
<h1 class="title">AI漫剧</h1>
<div class="grid">
  <div class="item">
    <video src="https://www.w3school.com.cn/i/movie.mp4" controls></video>
    <div class="item-title">AI奇幻漫剧</div>
    <div class="item-desc">AI生成高质量漫剧短片，画面精美，剧情紧凑。</div>
  </div>
  <div class="item">
    <video src="https://www.w3school.com.cn/i/movie.mp4" controls></video>
    <div class="item-title">AI都市漫剧</div>
    <div class="item-desc">现代都市情感故事，人物细腻，风格清新唯美。</div>
  </div>
  <div class="item">
    <video src="https://www.w3school.com.cn/i/movie.mp4" controls></video>
    <div class="item-title">AI古风漫剧</div>
    <div class="item-desc">唯美古风场景，沉浸式仙侠世界观体验。</div>
  </div>
  <div class="item">
    <video src="https://www.w3school.com.cn/i/movie.mp4" controls></video>
    <div class="item-title">AI科幻漫剧</div>
    <div class="item-desc">未来科幻题材，充满想象力的视觉体验。</div>
  </div>
</div>
</div>
